<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset</title>
<style>
body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#FBF8F4;margin:0;flex-direction:column;gap:1rem;padding:2rem;text-align:center}
h1{font-size:1.5rem;color:#A84F61}
p{color:#8A8580;font-size:.9rem;line-height:1.5}
button{padding:1rem 2rem;background:#D4788A;color:white;border:none;border-radius:16px;font-size:1rem;font-weight:500;cursor:pointer;font-family:sans-serif}
button:active{background:#A84F61}
.green{background:#7A9E8E}
#msg{color:#2C2B2B;font-weight:500;font-size:.9rem}
</style>
</head>
<body>
<div style="font-size:3rem">🔧</div>
<h1>Déblocage de l'app</h1>
<p>Cliquez sur le bouton ci-dessous pour effacer la configuration bloquée.<br>Vos événements et données ne seront <strong>pas effacés</strong>.</p>
<button onclick="resetCfg()">Effacer la config bloquée</button>
<button class="green" onclick="resetAll()">Tout effacer (données comprises)</button>
<p id="msg"></p>
<script>
function resetCfg(){
  try{
    localStorage.removeItem('ag_cfg');
    document.getElementById('msg').textContent='✅ Config effacée ! Redirection...';
    setTimeout(function(){window.location.href='/notre-agenda/index.html'},1500);
  }catch(e){
    document.getElementById('msg').textContent='Erreur : '+e.message;
  }
}
function resetAll(){
  if(!confirm('Attention : cela efface TOUTES vos données (événements, todo, anniversaires). Continuer ?'))return;
  try{
    localStorage.clear();
    document.getElementById('msg').textContent='✅ Tout effacé ! Redirection...';
    setTimeout(function(){window.location.href='/notre-agenda/index.html'},1500);
  }catch(e){
    document.getElementById('msg').textContent='Erreur : '+e.message;
  }
}
// Also auto-detect and show what's stored
window.onload=function(){
  var cfg=localStorage.getItem('ag_cfg');
  if(cfg){
    try{
      var c=JSON.parse(cfg);
      document.querySelector('p').innerHTML='Config bloquée détectée pour <strong>'+c.n1+'</strong> (code: '+c.code+')<br>Cliquez pour la débloquer sans perdre vos données.';
    }catch(e){}
  } else {
    document.querySelector('p').textContent='Aucune config bloquée détectée. Vous pouvez retourner à l\'app.';
  }
}
</script>
</body>
</html>
